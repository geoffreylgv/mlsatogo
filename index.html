<!doctype html>
<html lang="en">

<head>
  <!-- Basic Setup -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>MSA Togo | Microsoft Student Ambassadors Community in Togo</title>
  <meta name="description"
    content="MSA Togo empowers students in Togo through Microsoft Learn, Azure, AI, Web development, and cloud technologies. Join our tech community, attend events, and grow your leadership and technical skills." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://mlsatogo.vercel.app/" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mlsatogo.vercel.app/" />
  <meta property="og:title" content="MSA Togo | Empowering Students Through Microsoft Learn" />
  <meta property="og:description"
    content="Join MSA Togo to build AI, Azure, and cloud skills. Connect with the Microsoft Student Ambassadors global community." />
  <meta property="og:image" content="https://mlsatogo.vercel.app/images/seo_image.png" />
  <meta property="og:site_name" content="MSA Togo" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MSA Togo | Microsoft Student Ambassadors" />
  <meta name="twitter:description" content="Empowering students in Togo with AI, Azure, and Microsoft technologies." />
  <meta name="twitter:image" content="https://mlsatogo.vercel.app/images/seo_image.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Theme Color (Mobile Browser UI) -->
  <meta name="theme-color" content="#0078D4" />

  <!-- Structured Data (Organization Schema for Google) -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "MSA Togo",
        "url": "https://mlsatogo.vercel.app/",
        "logo": "https://mlsatogo.vercel.app/images/seo_image.png",
        "description": "Microsoft Student Ambassadors community in Togo empowering students through AI, Azure and cloud technologies.",
        "sameAs": [
          "https://twitter.com/msatogo",
          "https://www.youtube.com/@msatogo",
          "https://www.linkedin.com/company/msatogo"
        ]
      }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
